</head>
<body>
<!-- @partial:header -->

<main id="main">
  <article class="article">
    <div class="container">
      <div class="article-header">
        <ol class="breadcrumbs" aria-label="Breadcrumb">
          <li><a href="/">Home</a></li>
          <li><a href="/resources.html">Resources</a></li>
          {% if category_slug %}<li><a href="/blog/{{ category_slug }}/">{{ category_label }}</a></li>{% endif %}
          <li class="current">{{ title }}</li>
        </ol>
        <span class="article-eyebrow">{{ category_label }}</span>
        <h1>{{ title }}</h1>
        <p class="article-meta">
          <span>By {{ author }}</span>
          <span class="dot">·</span>
          <time datetime="{{ date_iso }}">{{ date }}</time>
        </p>
      </div>

      <figure class="article-hero">
        <img src="{{ image_url }}" alt="{{ image_alt }}" />
      </figure>

      <div class="article-body">
        {{ content | safe }}
      </div>
    </div>
  </article>
</main>

<!-- @partial:footer -->
<!-- @partial:scripts -->
</body>
</html>
