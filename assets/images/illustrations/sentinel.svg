<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="sentinel-title sentinel-desc">
  <title id="sentinel-title">Securade.ai Sentinel illustration</title>
  <desc id="sentinel-desc">A CCTV viewfinder showing a worksite, with a chat conversation asking what is happening on the site and getting a natural-language answer.</desc>
  <defs>
    <linearGradient id="sent-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1722"/>
      <stop offset="100%" stop-color="#18222f"/>
    </linearGradient>
    <pattern id="sent-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#5cbfbf" stroke-width="0.5" opacity="0.18"/>
    </pattern>
    <radialGradient id="sent-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5cbfbf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5cbfbf" stop-opacity="0"/>
    </radialGradient>
    <filter id="sent-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0b1220" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="640" height="480" fill="url(#sent-grid)"/>
  <circle cx="200" cy="240" r="220" fill="url(#sent-glow)"/>

  <!-- Video frame -->
  <g filter="url(#sent-shadow)" transform="translate(60 80)">
    <rect width="320" height="200" rx="12" fill="url(#sent-card)"/>
    <rect width="320" height="200" rx="12" fill="none" stroke="#5cbfbf" stroke-opacity="0.4"/>
    <!-- Frame corner markers -->
    <g stroke="#5cbfbf" stroke-width="2.5" fill="none">
      <path d="M 16 30 L 16 16 L 30 16"/>
      <path d="M 290 16 L 304 16 L 304 30"/>
      <path d="M 16 170 L 16 184 L 30 184"/>
      <path d="M 290 184 L 304 184 L 304 170"/>
    </g>
    <!-- LIVE indicator -->
    <g transform="translate(22 30)">
      <circle cx="6" cy="6" r="4" fill="#ef4444"/>
      <circle cx="6" cy="6" r="4" fill="#ef4444" opacity="0.4"/>
      <text x="18" y="10" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">LIVE</text>
    </g>
    <!-- Time -->
    <text x="298" y="40" font-family="ui-monospace, monospace" font-size="10" fill="#a0aec0" text-anchor="end">14:32:18</text>
    <!-- Worksite scene -->
    <!-- ground -->
    <rect x="20" y="140" width="280" height="40" fill="#1a2632" opacity="0.7"/>
    <!-- crane mast -->
    <line x1="80" y1="60" x2="80" y2="170" stroke="#a0aec0" stroke-width="2"/>
    <line x1="80" y1="60" x2="160" y2="70" stroke="#a0aec0" stroke-width="2"/>
    <line x1="80" y1="68" x2="155" y2="68" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="3 3"/>
    <!-- workers -->
    <g>
      <!-- worker 1 -->
      <circle cx="180" cy="138" r="5" fill="#fbbf24"/>
      <rect x="175" y="142" width="10" height="18" fill="#5cbfbf"/>
      <rect x="174" y="158" width="3" height="12" fill="#0b1220"/>
      <rect x="183" y="158" width="3" height="12" fill="#0b1220"/>
      <!-- detection box -->
      <rect x="168" y="130" width="26" height="44" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <rect x="168" y="120" width="60" height="10" fill="#22c55e"/>
      <text x="172" y="128" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#0b1220">PERSON · PPE OK</text>
    </g>
    <g>
      <!-- worker 2 -->
      <circle cx="240" cy="140" r="5" fill="#fbbf24"/>
      <rect x="235" y="144" width="10" height="18" fill="#f59e0b"/>
      <rect x="234" y="160" width="3" height="12" fill="#0b1220"/>
      <rect x="243" y="160" width="3" height="12" fill="#0b1220"/>
      <rect x="228" y="132" width="26" height="44" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    </g>
    <!-- forklift -->
    <g transform="translate(40 150)">
      <rect width="30" height="18" rx="2" fill="#f59e0b"/>
      <rect x="6" y="-4" width="14" height="8" fill="#f59e0b"/>
      <circle cx="7" cy="20" r="3.5" fill="#0b1220"/>
      <circle cx="23" cy="20" r="3.5" fill="#0b1220"/>
      <rect x="-14" y="0" width="14" height="2" fill="#a0aec0"/>
      <rect x="-14" y="14" width="14" height="2" fill="#a0aec0"/>
    </g>
    <!-- detection box on forklift -->
    <rect x="22" y="140" width="58" height="38" fill="none" stroke="#5cbfbf" stroke-width="1.5"/>
    <rect x="22" y="130" width="60" height="10" fill="#5cbfbf"/>
    <text x="26" y="138" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#0b1220">FORKLIFT</text>
  </g>

  <!-- Chat conversation -->
  <g transform="translate(400 70)">
    <!-- User bubble -->
    <g filter="url(#sent-shadow)">
      <rect x="0" y="0" width="200" height="56" rx="14" fill="#ffffff" stroke="#0b1220" stroke-opacity="0.06"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" fill="#7a8699" font-weight="600">YOU · 14:32</text>
      <text x="14" y="40" font-family="Inter, sans-serif" font-size="13" fill="#0b1220">What's happening at Site A</text>
      <text x="14" y="52" font-family="Inter, sans-serif" font-size="13" fill="#0b1220">right now?</text>
      <path d="M 24 56 L 18 66 L 32 56 Z" fill="#ffffff"/>
    </g>

    <!-- AI response -->
    <g transform="translate(0 80)" filter="url(#sent-shadow)">
      <rect width="220" height="130" rx="14" fill="url(#sent-card)"/>
      <rect width="220" height="130" rx="14" fill="none" stroke="#5cbfbf" stroke-opacity="0.5"/>
      <!-- Logo/avatar -->
      <g transform="translate(14 14)">
        <circle cx="10" cy="10" r="10" fill="#5cbfbf"/>
        <text x="10" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">S</text>
      </g>
      <text x="38" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#5cbfbf">SENTINEL · 14:32</text>
      <g font-family="Inter, sans-serif" font-size="12" fill="#e0e6ed">
        <text x="14" y="52">Two workers on site, both</text>
        <text x="14" y="69">wearing PPE. A forklift is</text>
        <text x="14" y="86">moving near them but stays</text>
        <text x="14" y="103">3.2m clear. No alerts in the</text>
        <text x="14" y="120">last 30 minutes.</text>
      </g>
      <path d="M 196 130 L 202 140 L 188 130 Z" fill="#18222f"/>
    </g>
  </g>
</svg>
