<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="tower-title tower-desc">
  <title id="tower-title">Securade.ai Tower illustration</title>
  <desc id="tower-desc">A weatherproof Tower deployment kit on a pole with two CCTV cameras on top, a solar panel, and ground-level worksite scene.</desc>
  <defs>
    <linearGradient id="tower-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cbfbf" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#5cbfbf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tower-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1722"/>
      <stop offset="100%" stop-color="#1a2632"/>
    </linearGradient>
    <pattern id="tower-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#5cbfbf" stroke-width="0.5" opacity="0.18"/>
    </pattern>
    <filter id="tower-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- backdrop grid -->
  <rect width="640" height="480" fill="url(#tower-grid)"/>
  <rect width="640" height="320" fill="url(#tower-sky)"/>

  <!-- ground line -->
  <line x1="40" y1="400" x2="600" y2="400" stroke="#0b1220" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="40" y1="404" x2="600" y2="404" stroke="#0b1220" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Sun / radial accent -->
  <circle cx="540" cy="90" r="36" fill="#5cbfbf" fill-opacity="0.18"/>
  <circle cx="540" cy="90" r="20" fill="#5cbfbf" fill-opacity="0.45"/>

  <!-- Pole -->
  <rect x="316" y="180" width="8" height="220" fill="#a0aec0"/>
  <rect x="304" y="395" width="32" height="8" rx="2" fill="#6b7585"/>

  <!-- Solar panel on top -->
  <g transform="translate(250 130)" filter="url(#tower-shadow)">
    <rect width="140" height="40" rx="4" fill="#1a2632" stroke="#5cbfbf" stroke-opacity="0.5"/>
    <g stroke="#5cbfbf" stroke-opacity="0.4" stroke-width="0.5">
      <line x1="35" y1="0" x2="35" y2="40"/>
      <line x1="70" y1="0" x2="70" y2="40"/>
      <line x1="105" y1="0" x2="105" y2="40"/>
      <line x1="0" y1="20" x2="140" y2="20"/>
    </g>
    <!-- mounting struts -->
    <line x1="40" y1="40" x2="60" y2="56" stroke="#a0aec0" stroke-width="3"/>
    <line x1="100" y1="40" x2="80" y2="56" stroke="#a0aec0" stroke-width="3"/>
  </g>

  <!-- Cameras (two, mounted on side bar) -->
  <g filter="url(#tower-shadow)">
    <!-- crossbar -->
    <rect x="240" y="210" width="160" height="6" rx="2" fill="#6b7585"/>
    <!-- camera left -->
    <g transform="translate(232 178)">
      <rect width="44" height="28" rx="4" fill="#0f1722"/>
      <rect x="-6" y="6" width="6" height="14" rx="2" fill="#0f1722"/>
      <circle cx="14" cy="14" r="9" fill="#0f1722" stroke="#5cbfbf" stroke-width="1"/>
      <circle cx="14" cy="14" r="5" fill="#5cbfbf"/>
      <circle cx="13" cy="12" r="1.5" fill="#ffffff" opacity="0.7"/>
      <circle cx="36" cy="22" r="2" fill="#22c55e"/>
    </g>
    <!-- camera right -->
    <g transform="translate(366 178) scale(-1 1) translate(-44 0)">
      <rect width="44" height="28" rx="4" fill="#0f1722"/>
      <rect x="-6" y="6" width="6" height="14" rx="2" fill="#0f1722"/>
      <circle cx="14" cy="14" r="9" fill="#0f1722" stroke="#5cbfbf" stroke-width="1"/>
      <circle cx="14" cy="14" r="5" fill="#5cbfbf"/>
      <circle cx="13" cy="12" r="1.5" fill="#ffffff" opacity="0.7"/>
      <circle cx="36" cy="22" r="2" fill="#22c55e"/>
    </g>
  </g>

  <!-- Vision cones -->
  <g fill="#5cbfbf" fill-opacity="0.10" stroke="#5cbfbf" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="3 5">
    <path d="M 254 200 L 130 380 L 200 380 Z"/>
    <path d="M 386 200 L 510 380 L 440 380 Z"/>
  </g>

  <!-- Main enclosure (the box) -->
  <g filter="url(#tower-shadow)" transform="translate(252 250)">
    <rect width="136" height="120" rx="10" fill="url(#tower-body)"/>
    <rect width="136" height="120" rx="10" fill="none" stroke="#5cbfbf" stroke-opacity="0.4"/>
    <!-- IP66 badge -->
    <rect x="14" y="14" width="48" height="20" rx="10" fill="#5cbfbf" fill-opacity="0.18"/>
    <text x="38" y="28" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#5cbfbf" text-anchor="middle" letter-spacing="0.5">IP66</text>
    <!-- screen -->
    <rect x="14" y="42" width="108" height="40" rx="4" fill="#0b1220" stroke="#5cbfbf" stroke-opacity="0.3"/>
    <text x="22" y="60" font-family="ui-monospace, monospace" font-size="9" fill="#5cbfbf">SITE-A · LIVE</text>
    <g font-family="ui-monospace, monospace" font-size="8" fill="#a0aec0">
      <text x="22" y="74">4G · 92% · 2 CAM</text>
    </g>
    <!-- vents and indicators -->
    <g fill="#22c55e">
      <circle cx="22" cy="100" r="2.5"/>
      <circle cx="32" cy="100" r="2.5"/>
    </g>
    <rect x="50" y="96" width="60" height="8" rx="2" fill="#0b1220" stroke="#5cbfbf" stroke-opacity="0.25"/>
    <text x="80" y="103" font-family="Inter, sans-serif" font-size="7" fill="#a0aec0" text-anchor="middle">HUB · 4G · UPS</text>
  </g>

  <!-- Worker silhouette -->
  <g fill="#0b1220" opacity="0.55">
    <circle cx="130" cy="358" r="6"/>
    <rect x="124" y="365" width="12" height="22" rx="2"/>
    <rect x="120" y="380" width="4" height="18"/>
    <rect x="136" y="380" width="4" height="18"/>
    <!-- helmet -->
    <path d="M 122 350 Q 130 344 138 350" fill="#f59e0b" opacity="0.9"/>
  </g>
  <g fill="#0b1220" opacity="0.55">
    <circle cx="500" cy="360" r="5.5"/>
    <rect x="495" y="366" width="11" height="20" rx="2"/>
    <rect x="492" y="381" width="3" height="17"/>
    <rect x="506" y="381" width="3" height="17"/>
    <path d="M 493 352 Q 500 347 507 352" fill="#f59e0b" opacity="0.9"/>
  </g>
</svg>
