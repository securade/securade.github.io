<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="tower-title tower-desc">
  <title id="tower-title">Securade.ai Tower illustration</title>
  <desc id="tower-desc">A weatherproof Tower deployment kit on a pole with solar panel, two CCTV cameras, 4G antenna, IP66 enclosure with status screen and battery, and a worksite scene below.</desc>
  <defs>
    <linearGradient id="tower-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cbfbf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5cbfbf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tower-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2632"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="tower-solar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c2543"/>
      <stop offset="100%" stop-color="#061a31"/>
    </linearGradient>
    <pattern id="tower-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#5cbfbf" stroke-width="0.5" opacity="0.16"/>
    </pattern>
    <pattern id="solar-cells" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="url(#tower-solar)"/>
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#1f4d7a" stroke-width="0.6"/>
      <line x1="7" y1="0" x2="7" y2="14" stroke="#1f4d7a" stroke-width="0.3" opacity="0.6"/>
      <line x1="0" y1="7" x2="14" y2="7" stroke="#1f4d7a" stroke-width="0.3" opacity="0.6"/>
    </pattern>
    <filter id="tower-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="480" fill="url(#tower-grid)"/>
  <rect width="640" height="320" fill="url(#tower-sky)"/>

  <!-- sun -->
  <g>
    <circle cx="556" cy="74" r="42" fill="#5cbfbf" fill-opacity="0.10"/>
    <circle cx="556" cy="74" r="26" fill="#f59e0b" fill-opacity="0.30"/>
    <circle cx="556" cy="74" r="16" fill="#f59e0b" fill-opacity="0.65"/>
    <g stroke="#f59e0b" stroke-opacity="0.45" stroke-width="1.4">
      <line x1="556" y1="22" x2="556" y2="32"/>
      <line x1="556" y1="116" x2="556" y2="126"/>
      <line x1="500" y1="74" x2="510" y2="74"/>
      <line x1="602" y1="74" x2="612" y2="74"/>
    </g>
  </g>

  <!-- distant building silhouettes -->
  <g fill="#0b1220" opacity="0.10">
    <rect x="20" y="340" width="60" height="60"/>
    <rect x="80" y="320" width="40" height="80"/>
    <rect x="540" y="335" width="60" height="65"/>
    <rect x="600" y="350" width="30" height="50"/>
    <!-- crane -->
    <g stroke="#0b1220" stroke-opacity="0.18" stroke-width="2" fill="none">
      <line x1="80" y1="320" x2="80" y2="220"/>
      <line x1="80" y1="220" x2="180" y2="220"/>
      <line x1="80" y1="220" x2="40" y2="220"/>
      <line x1="80" y1="220" x2="80" y2="245"/>
      <line x1="100" y1="220" x2="100" y2="240"/>
    </g>
  </g>

  <!-- ground -->
  <line x1="20" y1="400" x2="620" y2="400" stroke="#0b1220" stroke-opacity="0.22" stroke-width="1.2"/>
  <line x1="20" y1="406" x2="620" y2="406" stroke="#0b1220" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- pole + base -->
  <rect x="316" y="180" width="8" height="220" fill="#a0aec0"/>
  <rect x="312" y="180" width="2" height="220" fill="#6b7585"/>
  <rect x="290" y="395" width="60" height="10" rx="2" fill="#5b6b80"/>
  <rect x="290" y="405" width="60" height="6" fill="#3f4a5c"/>
  <!-- foundation bolts -->
  <circle cx="300" cy="402" r="2" fill="#0b1220" opacity="0.6"/>
  <circle cx="340" cy="402" r="2" fill="#0b1220" opacity="0.6"/>

  <!-- 4G antenna -->
  <g transform="translate(390 110)">
    <rect x="-2" y="0" width="4" height="60" fill="#3f4a5c"/>
    <circle cx="0" cy="-6" r="6" fill="#5b6b80"/>
    <!-- signal arcs -->
    <g fill="none" stroke="#5cbfbf" stroke-width="1.4" stroke-linecap="round">
      <path d="M 10 -8 Q 22 -2 14 14" opacity="0.9"/>
      <path d="M 18 -16 Q 38 0 22 28" opacity="0.7"/>
      <path d="M 26 -24 Q 54 2 32 42" opacity="0.5"/>
    </g>
  </g>

  <!-- Solar panel -->
  <g transform="translate(238 116)" filter="url(#tower-shadow)">
    <!-- tilted panel via skew approximation: use parallelogram outline -->
    <polygon points="0,30 160,8 160,52 0,74" fill="url(#solar-cells)" stroke="#5cbfbf" stroke-opacity="0.45"/>
    <polygon points="0,30 160,8 160,52 0,74" fill="none" stroke="#1f4d7a" stroke-width="0.8"/>
    <!-- mounting struts -->
    <line x1="40" y1="58" x2="60" y2="86" stroke="#a0aec0" stroke-width="3"/>
    <line x1="110" y1="42" x2="84" y2="86" stroke="#a0aec0" stroke-width="3"/>
    <circle cx="60" cy="86" r="3" fill="#3f4a5c"/>
    <circle cx="84" cy="86" r="3" fill="#3f4a5c"/>
  </g>

  <!-- Camera crossbar + two cameras -->
  <g filter="url(#tower-shadow)">
    <rect x="232" y="212" width="176" height="6" rx="2" fill="#6b7585"/>
    <!-- camera left, angled -->
    <g transform="translate(230 184)">
      <rect width="48" height="30" rx="5" fill="#0f1722"/>
      <rect x="-8" y="6" width="8" height="18" rx="2" fill="#0f1722"/>
      <circle cx="16" cy="15" r="10" fill="#0a0f17" stroke="#5cbfbf" stroke-width="1"/>
      <circle cx="16" cy="15" r="6" fill="#5cbfbf"/>
      <circle cx="14" cy="13" r="1.8" fill="#ffffff" opacity="0.85"/>
      <rect x="30" y="6" width="14" height="2.5" fill="#5b6b80"/>
      <rect x="30" y="10" width="10" height="2" fill="#5b6b80" opacity="0.7"/>
      <circle cx="40" cy="24" r="2.5" fill="#22c55e"/>
      <!-- mount bracket -->
      <rect x="14" y="30" width="20" height="6" fill="#5b6b80"/>
    </g>
    <!-- camera right, mirrored -->
    <g transform="translate(410 184) scale(-1 1)">
      <rect width="48" height="30" rx="5" fill="#0f1722"/>
      <rect x="-8" y="6" width="8" height="18" rx="2" fill="#0f1722"/>
      <circle cx="16" cy="15" r="10" fill="#0a0f17" stroke="#5cbfbf" stroke-width="1"/>
      <circle cx="16" cy="15" r="6" fill="#5cbfbf"/>
      <circle cx="14" cy="13" r="1.8" fill="#ffffff" opacity="0.85"/>
      <rect x="30" y="6" width="14" height="2.5" fill="#5b6b80"/>
      <rect x="30" y="10" width="10" height="2" fill="#5b6b80" opacity="0.7"/>
      <circle cx="40" cy="24" r="2.5" fill="#22c55e"/>
      <rect x="14" y="30" width="20" height="6" fill="#5b6b80"/>
    </g>
  </g>

  <!-- Vision cones -->
  <g fill="#5cbfbf" fill-opacity="0.10" stroke="#5cbfbf" stroke-opacity="0.32" stroke-width="1" stroke-dasharray="3 5">
    <path d="M 248 214 L 110 388 L 196 388 Z"/>
    <path d="M 392 214 L 530 388 L 444 388 Z"/>
  </g>

  <!-- Main enclosure -->
  <g filter="url(#tower-shadow)" transform="translate(244 248)">
    <rect width="152" height="138" rx="12" fill="url(#tower-body)"/>
    <rect width="152" height="138" rx="12" fill="none" stroke="#5cbfbf" stroke-opacity="0.40"/>
    <!-- hinges -->
    <rect x="-2" y="18" width="4" height="14" rx="1" fill="#5cbfbf" opacity="0.5"/>
    <rect x="-2" y="106" width="4" height="14" rx="1" fill="#5cbfbf" opacity="0.5"/>

    <!-- IP66 badge -->
    <rect x="14" y="14" width="48" height="20" rx="10" fill="#5cbfbf" fill-opacity="0.20"/>
    <text x="38" y="28" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#5cbfbf" text-anchor="middle" letter-spacing="0.5">IP66</text>
    <text x="138" y="28" font-family="Inter, sans-serif" font-size="9" fill="#7a8aa3" text-anchor="end" letter-spacing="0.3">TOWER</text>

    <!-- screen -->
    <rect x="14" y="42" width="124" height="46" rx="4" fill="#0b1220" stroke="#5cbfbf" stroke-opacity="0.35"/>
    <text x="22" y="58" font-family="ui-monospace, monospace" font-size="9" fill="#5cbfbf">SITE-A · LIVE</text>
    <g font-family="ui-monospace, monospace" font-size="8" fill="#a0aec0">
      <text x="22" y="72">4G · 92%  ·  2 CAM</text>
      <text x="22" y="83">BAT 87%  ·  UPS OK</text>
    </g>
    <!-- mini chart -->
    <polyline points="92,80 99,76 106,78 113,70 120,73 127,66 134,68" fill="none" stroke="#22c55e" stroke-width="1.2"/>

    <!-- module strip -->
    <rect x="14" y="96" width="124" height="28" rx="4" fill="#0a0f17" stroke="#5cbfbf" stroke-opacity="0.20"/>
    <g fill="#22c55e">
      <circle cx="22" cy="110" r="2.5"/>
      <circle cx="30" cy="110" r="2.5"/>
      <circle cx="38" cy="110" r="2.5"/>
    </g>
    <text x="48" y="113" font-family="Inter, sans-serif" font-size="8" fill="#a0aec0">HUB · 4G · UPS</text>
    <rect x="100" y="104" width="32" height="12" rx="2" fill="none" stroke="#5b6b80"/>
    <rect x="102" y="106" width="22" height="8" fill="#22c55e" opacity="0.6"/>
    <text x="103" y="113" font-family="Inter, sans-serif" font-size="7" fill="#ffffff" font-weight="700">87%</text>
  </g>

  <!-- Power cable from enclosure to ground/generator -->
  <path d="M 320 386 Q 320 396 340 400" fill="none" stroke="#0b1220" stroke-opacity="0.45" stroke-width="2"/>

  <!-- Generator silhouette -->
  <g transform="translate(420 372)" opacity="0.85">
    <rect width="46" height="26" rx="3" fill="#3f4a5c"/>
    <rect x="4" y="4" width="20" height="10" rx="1" fill="#5b6b80"/>
    <circle cx="36" cy="9" r="2" fill="#f59e0b"/>
    <rect x="32" y="14" width="10" height="6" rx="1" fill="#5b6b80"/>
    <text x="23" y="35" font-family="Inter, sans-serif" font-size="7" fill="#5b6b80" text-anchor="middle">GENSET</text>
  </g>

  <!-- Worker silhouettes -->
  <g fill="#0b1220" opacity="0.65">
    <circle cx="134" cy="358" r="6"/>
    <rect x="128" y="365" width="12" height="22" rx="2"/>
    <rect x="124" y="380" width="4" height="18"/>
    <rect x="140" y="380" width="4" height="18"/>
    <path d="M 126 350 Q 134 344 142 350" fill="#f59e0b" opacity="0.95"/>
    <rect x="126" y="372" width="16" height="3" fill="#5cbfbf" opacity="0.8"/>
  </g>
  <g fill="#0b1220" opacity="0.65">
    <circle cx="166" cy="362" r="5.5"/>
    <rect x="161" y="368" width="11" height="20" rx="2"/>
    <rect x="158" y="382" width="3" height="16"/>
    <rect x="172" y="382" width="3" height="16"/>
    <path d="M 159 354 Q 166 349 173 354" fill="#f59e0b" opacity="0.95"/>
  </g>
  <g fill="#0b1220" opacity="0.65">
    <circle cx="494" cy="360" r="5.5"/>
    <rect x="489" y="366" width="11" height="20" rx="2"/>
    <rect x="486" y="381" width="3" height="17"/>
    <rect x="500" y="381" width="3" height="17"/>
    <path d="M 487 352 Q 494 347 501 352" fill="#f59e0b" opacity="0.95"/>
    <rect x="487" y="372" width="15" height="3" fill="#5cbfbf" opacity="0.8"/>
  </g>
</svg>
