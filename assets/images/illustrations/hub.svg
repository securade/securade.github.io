<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="hub-title hub-desc">
  <title id="hub-title">Securade.ai HUB illustration</title>
  <desc id="hub-desc">Central edge AI device receiving live feeds from six CCTV cameras with detection labels, latency and throughput indicators.</desc>
  <defs>
    <radialGradient id="hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5cbfbf" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#5cbfbf" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5cbfbf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1722"/>
      <stop offset="100%" stop-color="#18222f"/>
    </linearGradient>
    <linearGradient id="hub-server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2434"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <pattern id="hub-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.18"/>
    </pattern>
    <filter id="hub-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0b1220" flood-opacity="0.16"/>
    </filter>
    <symbol id="hub-cam" viewBox="0 0 100 64">
      <rect width="100" height="64" rx="8" fill="#ffffff" stroke="#0b1220" stroke-opacity="0.10"/>
      <circle cx="24" cy="32" r="14" fill="#0f1722"/>
      <circle cx="24" cy="32" r="8" fill="#5cbfbf"/>
      <circle cx="22" cy="29" r="2.2" fill="#ffffff" opacity="0.85"/>
      <rect x="46" y="16" width="36" height="4" rx="2" fill="#0b1220" opacity="0.42"/>
      <rect x="46" y="25" width="28" height="4" rx="2" fill="#0b1220" opacity="0.28"/>
      <rect x="46" y="34" width="22" height="4" rx="2" fill="#0b1220" opacity="0.20"/>
      <rect x="46" y="43" width="32" height="6" rx="2" fill="#5cbfbf" opacity="0.18"/>
      <circle cx="86" cy="52" r="3" fill="#22c55e"/>
      <circle cx="86" cy="52" r="6" fill="#22c55e" opacity="0.20"/>
    </symbol>
  </defs>

  <rect width="640" height="480" fill="url(#hub-grid)" color="#5cbfbf"/>
  <circle cx="320" cy="240" r="220" fill="url(#hub-glow)"/>

  <!-- Connection lines, animated dashed feel -->
  <g stroke="#5cbfbf" stroke-width="1.4" fill="none" opacity="0.7" stroke-dasharray="3 6">
    <path d="M 110 80 Q 220 160 320 240"/>
    <path d="M 530 80 Q 420 160 320 240"/>
    <path d="M 70 240 L 320 240"/>
    <path d="M 570 240 L 320 240"/>
    <path d="M 110 400 Q 220 320 320 240"/>
    <path d="M 530 400 Q 420 320 320 240"/>
  </g>

  <!-- Bandwidth pulse dots along a couple of lines -->
  <g fill="#5cbfbf">
    <circle r="3" cx="180" cy="125"/>
    <circle r="3" cx="460" cy="125"/>
    <circle r="3" cx="200" cy="240" opacity="0.8"/>
    <circle r="3" cx="440" cy="240" opacity="0.8"/>
    <circle r="3" cx="180" cy="355"/>
  </g>

  <!-- Six cameras around the hub -->
  <g filter="url(#hub-shadow)">
    <use href="#hub-cam" x="60" y="50" width="110" height="70"/>
    <use href="#hub-cam" x="470" y="50" width="110" height="70"/>
    <use href="#hub-cam" x="20" y="205" width="110" height="70"/>
    <use href="#hub-cam" x="510" y="205" width="110" height="70"/>
    <use href="#hub-cam" x="60" y="370" width="110" height="70"/>
    <use href="#hub-cam" x="470" y="370" width="110" height="70"/>
  </g>

  <!-- Camera labels -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#5b6b80" font-weight="500">
    <text x="115" y="135" text-anchor="middle">CAM-01 · Gate</text>
    <text x="525" y="135" text-anchor="middle">CAM-02 · Yard</text>
    <text x="75" y="290" text-anchor="middle">CAM-03 · Bay</text>
    <text x="565" y="290" text-anchor="middle">CAM-04 · Dock</text>
    <text x="115" y="455" text-anchor="middle">CAM-05 · Lift</text>
    <text x="525" y="455" text-anchor="middle">CAM-06 · Roof</text>
  </g>

  <!-- Central HUB server unit -->
  <g filter="url(#hub-shadow)" transform="translate(195 160)">
    <!-- server chassis -->
    <rect width="250" height="160" rx="16" fill="url(#hub-server)" stroke="#5cbfbf" stroke-opacity="0.35"/>
    <!-- top rail -->
    <rect x="18" y="14" width="48" height="20" rx="10" fill="#5cbfbf" fill-opacity="0.18"/>
    <text x="42" y="28" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#5cbfbf" text-anchor="middle" letter-spacing="0.5">HUB</text>
    <text x="232" y="28" font-family="Inter, sans-serif" font-size="9" fill="#7a8aa3" text-anchor="end" letter-spacing="0.3">EDGE · v3.4</text>

    <!-- detection rows -->
    <g font-family="Inter, sans-serif" font-size="11" fill="#a0aec0">
      <circle cx="28" cy="58" r="3.5" fill="#22c55e"/>
      <text x="40" y="62">hard hat detected</text>
      <text x="222" y="62" fill="#a0aec0" text-anchor="end" font-size="10">98%</text>

      <circle cx="28" cy="82" r="3.5" fill="#22c55e"/>
      <text x="40" y="86">high-vis vest ok</text>
      <text x="222" y="86" fill="#a0aec0" text-anchor="end" font-size="10">96%</text>

      <circle cx="28" cy="106" r="3.5" fill="#f59e0b"/>
      <text x="40" y="110">person near forklift</text>
      <text x="222" y="110" fill="#f59e0b" text-anchor="end" font-size="10">82%</text>

      <circle cx="28" cy="130" r="3.5" fill="#ef4444"/>
      <text x="40" y="134">restricted zone entry</text>
      <text x="222" y="134" fill="#ef4444" text-anchor="end" font-size="10">91%</text>
    </g>

    <!-- bottom status row -->
    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="8" fill="#5b6b80">
      <rect x="0" y="142" width="250" height="18" rx="0" fill="#000000" fill-opacity="0.18"/>
      <circle cx="14" cy="151" r="3" fill="#22c55e"/>
      <text x="22" y="154" fill="#9aa7ba">6 cams · 25fps</text>
      <text x="125" y="154" fill="#9aa7ba">lat 38ms</text>
      <text x="175" y="154" fill="#9aa7ba">GPU 42%</text>
      <circle cx="232" cy="151" r="3" fill="#5cbfbf"/>
      <text x="240" y="154" fill="#9aa7ba" text-anchor="end">on</text>
    </g>
  </g>
</svg>
